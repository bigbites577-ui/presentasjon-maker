<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Slide Discreet Craft</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <div class="brand-row">
          <div class="mark">S</div>
          <div>
            <p class="eyebrow">Slide Discreet Craft</p>
            <h1>Presentation maker</h1>
          </div>
        </div>

        <form id="briefForm" class="brief-grid">
          <label class="field span-2">
            <span>What is the presentation about?</span>
            <textarea id="topic" rows="3" placeholder="Example: How renewable energy changes small cities" required></textarea>
          </label>

          <label class="field span-2">
            <span>Criteria</span>
            <textarea id="criteria" rows="5" placeholder="Audience, tone, important points, must-have sections, school level, deadline, anything you care about."></textarea>
          </label>

          <label class="field">
            <span>Style</span>
            <select id="style">
              <option value="studio">Studio craft</option>
              <option value="nordic">Nordic calm</option>
              <option value="executive">Executive clear</option>
              <option value="playful">Playful pitch</option>
              <option value="minimal">Minimal white</option>
            </select>
          </label>

          <label class="field">
            <span>Slides</span>
            <input id="slideCount" type="number" min="5" max="12" value="7" />
          </label>

          <label class="field">
            <span>What should I say?</span>
            <select id="notesLevel">
              <option value="medium">Medium script</option>
              <option value="short">Short script</option>
              <option value="long">Detailed script</option>
            </select>
          </label>

          <label class="toggle">
            <input id="emoji" type="checkbox" />
            <span class="switch"></span>
            <span>Use emojis</span>
          </label>

          <div class="actions span-2">
            <button class="primary" type="submit">
              <span>Generate images</span>
            </button>
            <button class="secondary" id="downloadBtn" type="button" disabled>
              <span>Download .pptx</span>
            </button>
          </div>
        </form>
      </section>

      <aside class="preview-panel">
        <div class="panel-head">
          <div>
            <p class="eyebrow">Choose visual</p>
            <h2>Image directions</h2>
          </div>
          <p id="status">Ready</p>
        </div>
        <div id="imageGrid" class="image-grid empty">
          <div class="empty-state">Generate to create four visual options for your deck.</div>
        </div>

        <div class="slides-preview">
          <div class="panel-head compact">
            <div>
              <p class="eyebrow">Deck plan</p>
              <h2>Slides</h2>
            </div>
          </div>
          <ol id="slideList" class="slide-list"></ol>
        </div>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
